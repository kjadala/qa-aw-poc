name: TFS Work Item Analysis with Claude

on:
  workflow_dispatch:
    inputs:
      work_item_id:
        description: "Enter TFS Work Item ID"
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest

    env:
      TFS_URL: ${{ secrets.TFS_URL }}
      TFS_PAT: ${{ secrets.TFS_PAT }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure jq is installed
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

      - name: Get Work Item from TFS
        run: |
          curl -s -u :$TFS_PAT \
          "$TFS_URL/_apis/wit/workitems/${{ github.event.inputs.work_item_id }}?api-version=6.0" \
          -o workitem.json

          cat workitem.json

      - name: Extract fields and build prompt
        run: |
          TITLE=$(jq -r '.fields["System.Title"]' workitem.json)
          DESC=$(jq -r '.fields["System.Description"]' workitem.json | sed 's/<[^>]*>//g; s/&nbsp;/ /g; s/&gt;/>/g; s/&lt;/</g; s/&amp;/\&/g')

          PROMPT="Analyze this user story and provide:
          - Story points
          - Complexity
          - Risks
          - Suggestions

          Title: $TITLE
          Description: $DESC"

          # Use jq to safely build JSON payload (handles newlines/special chars)
          jq -n --arg prompt "$PROMPT" '{
            model: "claude-sonnet-4-20250514",
            max_tokens: 800,
            messages: [{role: "user", content: $prompt}]
          }' > payload.json

      - name: Call Claude API
        run: |
          curl -s https://api.anthropic.com/v1/messages \
          -H "x-api-key: $CLAUDE_API_KEY" \
          -H "anthropic-version: 2023-06-01" \
          -H "content-type: application/json" \
          -d @payload.json > response.json

          cat response.json

      - name: Show result
        run: |
          jq -r '.content[0].text' response.json